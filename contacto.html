<!doctype html>
<html lang="es" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="nav_contact">Contacto - Biopixel</title>
    <meta name="description" content="Contacta a Biopixel para soluciones de agricultura de precisión.">
    <link rel="icon" href="images/logo-48x48.png" type="image/png">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="global.css?v=3.0">
    <script defer src="form-handler.js?v=1.1"></script>
    <script defer src="i18n.js?v=1.1"></script>
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "daa67763f94b4ca7ba2632cd27e6c892"}'></script>
    <style>
        .form-section {
            padding-top: 180px;
            padding-bottom: 160px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .form-container {
            width: 100%;
            max-width: 520px;
            padding: 0 24px;
        }

        .form-eyebrow {
            display: block;
            font-size: 0.58rem;
            letter-spacing: 0.35em;
            color: var(--primary);
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .form-container h2 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.8rem, 7vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -0.04em;
            line-height: 0.9;
            margin-bottom: 72px;
            color: var(--text-main);
        }

        .form-container h2 span {
            color: var(--primary);
            font-style: italic;
        }

        .form-group {
            margin-bottom: 40px;
        }

        .form-group label {
            display: block;
            margin-bottom: 14px;
            color: var(--text-muted);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 0;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--ghost-border);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.4s ease;
            border-radius: 0;
            font-weight: 300;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--primary);
            outline: none;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        #responseMessage {
            margin-top: 32px;
            padding: 16px 20px;
            border-radius: 0;
            display: none;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
        }

        #responseMessage.success {
            background-color: var(--primary-ghost);
            color: var(--primary);
            display: block;
            border: 1px solid rgba(148, 148, 199, 0.15);
        }

        #responseMessage.error {
            background-color: rgba(239, 68, 68, 0.05);
            color: #f87171;
            display: block;
            border: 1px solid rgba(239, 68, 68, 0.12);
        }

        .boton-enviar {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--primary);
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 16px 48px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            margin-top: 12px;
            position: relative;
            overflow: hidden;
        }

        .boton-enviar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .boton-enviar:hover {
            color: var(--bg-main);
        }

        .boton-enviar:hover::before {
            left: 0;
        }

        .boton-enviar:disabled {
            border-color: var(--ghost-border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .boton-enviar:disabled:hover::before {
            left: -100%;
        }

        .boton-enviar:disabled:hover {
            color: var(--text-muted);
        }
    </style>
</head>

<body class="i18n-loading">
    <header class="barra-superior glass" id="page-header">
        <a href="index.html" class="logo-contenedor">
            <img src="images/logo.png" alt="Icono de Biopixel" class="logo-icono">
            <span class="logo-texto">Biopixel</span>
        </a>
        <nav class="nav-desktop">
            <div class="nav-links">
                <a href="index.html#inicio" data-i18n="nav_home">Inicio</a>
                <a href="about.html" data-i18n="nav_about">Nosotros</a>
                <a href="index.html#servicios" data-i18n="nav_services">Servicios</a>
                <a href="contacto.html" class="active" data-i18n="nav_contact">Contacto</a>
            </div>
            <div class="lang-switcher">
                <button onclick="setLanguage('es')" id="lang-es">ES</button>
                <button onclick="setLanguage('en')" id="lang-en">EN</button>
            </div>
        </nav>
        <button class="hamburger-button" id="hamburger-button">
            <svg width="24px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7">
                </path>
            </svg>
        </button>
    </header>

    <div class="mobile-menu glass" id="mobile-menu">
        <a href="index.html#inicio" onclick="closeMobileMenu()" data-i18n="nav_home">Inicio</a>
        <a href="about.html" onclick="closeMobileMenu()" data-i18n="nav_about">Nosotros</a>
        <a href="index.html#servicios" onclick="closeMobileMenu()" data-i18n="nav_services">Servicios</a>
        <a href="contacto.html" onclick="closeMobileMenu()" data-i18n="nav_contact">Contacto</a>
    </div>

    <main class="form-section">
        <div class="form-container">
            <span class="form-eyebrow reveal">Contacto</span>
            <h2 class="reveal reveal-delay-1" data-i18n="nav_contact">Hablemos<span>.</span></h2>
            <form id="contactForm">
                <div class="form-group reveal reveal-delay-2">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group reveal reveal-delay-2">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group reveal reveal-delay-3">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                </div>
                <div class="reveal reveal-delay-3">
                    <button type="submit" class="boton-enviar" id="submitButton" data-i18n="form_button">Enviar</button>
                </div>
            </form>
            <div id="responseMessage"></div>
        </div>
    </main>

    <footer id="page-footer">
        <p data-i18n="footer_text">© 2025 Biopixel. Todos los derechos reservados.</p>
    </footer>

    <script>
        const pageHeader = document.getElementById('page-header');
        const hamburgerBtn = document.getElementById('hamburger-button');
        const mobileMenu = document.getElementById('mobile-menu');

        hamburgerBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            pageHeader.classList.toggle('menu-is-open');
        });

        function closeMobileMenu() {
            mobileMenu.classList.remove('open');
            pageHeader.classList.remove('menu-is-open');
        }

        window.addEventListener('scroll', () => {
            pageHeader.classList.toggle('scrolled', window.scrollY > 60);
        }, { passive: true });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    </script>
</body>

</html>
