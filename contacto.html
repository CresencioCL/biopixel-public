<!doctype html>
<html lang="es" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="nav_contact">Contacto - Biopixel</title>
    <link rel="icon" href="images/logo-48x48.png" type="image/png">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="global.css?v=1.1">
    <script defer src="form-handler.js?v=1.1"></script>
    <script defer src="i18n.js?v=1.1"></script>
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "daa67763f94b4ca7ba2632cd27e6c892"}'></script>
    <style>
        .form-section {
            padding-top: 150px;
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        .form-container h2 {
            margin-bottom: 48px;
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 500;
        }

        .form-container h2 span {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 32px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 0;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--glass-border);
            color: #fff;
            font-family: "Inter", sans-serif;
            transition: var(--transition);
            border-radius: 0;
            font-weight: 300;
            font-size: 1.1rem;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--primary);
            outline: none;
        }

        #responseMessage {
            margin-top: 32px;
            padding: 16px;
            border-radius: var(--radius);
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }

        #responseMessage.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            display: block;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        #responseMessage.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            display: block;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Glowing Submit Button */
        .boton-enviar {
            background-color: #e53e3e;
            color: #fff;
            border: none;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(229, 62, 62, 0.4);
            transition: all 0.4s ease;
            padding: 16px 48px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: var(--radius);
        }

        .boton-enviar:hover {
            background-color: #48bb78;
            color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(72, 187, 120, 0.5), 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .boton-enviar:disabled {
            background-color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="i18n-loading">
    <header class="barra-superior glass" id="page-header">
        <a href="index.html" class="logo-contenedor">
            <img src="images/logo.png" alt="Icono de Biopixel" class="logo-icono">
            <span class="logo-texto">Biopixel</span>
        </a>
        <nav class="nav-desktop">
            <div class="nav-links">
                <a href="index.html#inicio" data-i18n="nav_home">Inicio</a>
                <a href="about.html" data-i18n="nav_about">Nosotros</a>
                <a href="index.html#servicios" data-i18n="nav_services">Servicios</a>
                <a href="contacto.html" class="active" data-i18n="nav_contact">Contacto</a>
            </div>
            <div class="lang-switcher">
                <button onclick="setLanguage('es')" id="lang-es">ES</button>
                <button onclick="setLanguage('en')" id="lang-en">EN</button>
            </div>
        </nav>
        <button class="hamburger-button" id="hamburger-button">
            <svg width="24px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7">
                </path>
            </svg>
        </button>
    </header>

    <div class="mobile-menu glass" id="mobile-menu">
        <a href="index.html#inicio" onclick="closeMobileMenu()" data-i18n="nav_home">Inicio</a>
        <a href="about.html" onclick="closeMobileMenu()" data-i18n="nav_about">Nosotros</a>
        <a href="index.html#servicios" onclick="closeMobileMenu()" data-i18n="nav_services">Servicios</a>
        <a href="contacto.html" onclick="closeMobileMenu()" data-i18n="nav_contact">Contacto</a>
    </div>

    <main class="form-section">
        <div class="form-container">
            <h2 data-i18n="nav_contact">Contacto <span>.</span></h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                </div>
                <button type="submit" class="boton-enviar" id="submitButton">Enviar</button>
            </form>
            <div id="responseMessage"></div>
        </div>
    </main>

    <footer id="page-footer">
        <p data-i18n="footer_text">© 2025 Biopixel. Todos los derechos reservados.</p>
    </footer>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const pageHeader = document.getElementById('page-header');

        hamburgerBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            pageHeader.classList.toggle('menu-is-open');
        });

        function closeMobileMenu() {
            mobileMenu.classList.remove('open');
            pageHeader.classList.remove('menu-is-open');
        }
    </script>
</body>

</html>
